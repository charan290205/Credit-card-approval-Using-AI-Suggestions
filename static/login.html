<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Credit Risk • Secure Access</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-animation"></div>

  <div class="container">
    <div class="login-wrapper">
      <div class="brand-header">
        <div class="logo-circle">
          <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h1>AI Credit Risk</h1>
        <p class="tagline">Intelligent • Secure • Instant</p>
      </div>

      <div class="login-card glass">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to access your credit intelligence dashboard</p>

        <form id="loginForm" autocomplete="off">
          <div class="input-field">
            <input type="text" id="username" required spellcheck="false" autocomplete="off"/>
            <label for="username">Email or Username</label>
            <i class="fa-solid fa-user icon-left"></i>
          </div>

          <div class="input-field">
            <input type="password" id="password" required/>
            <label for="password">Password</label>
            <i class="fa-solid fa-lock icon-left"></i>
            <i class="fa-solid fa-eye-slash toggle-password" id="togglePassword"></i>
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" id="remember"/>
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="submit-btn">
            <span>Sign In</span>
            <i class="fa-solid fa-arrow-right"></i>
          </button>
        </form>

        <div class="alternative">
          <p>Don't have an account? <a href="#" class="signup-link">Create one</a></p>
        </div>
      </div>

      <div class="footer-info">
        <p>© 2026 AI Credit Risk Intelligence • Hyderabad</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
